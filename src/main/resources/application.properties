spring.application.name=E-commerceV2



spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.datasource.url=jdbc:sqlserver://host.docker.internal:1433;databaseName=Ecommerce;encrypt=true;trustServerCertificate=true;

spring.datasource.username=o
spring.datasource.password=123

# 1. Table Management (The most important setting)
spring.jpa.hibernate.ddl-auto=none

# 2. SQL Logging (Great for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true

# 3. SQL Server Dialect (Tells Hibernate how to speak "SQL Server")
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# 4. Show descriptive error messages
spring.jpa.properties.hibernate.type=descriptor.sql.BasicBinder

logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


jwt.secret = mySuperSecretKeyThatIsAtLeast32CharactersLong123!
jwt.expirationMs = 86400000


