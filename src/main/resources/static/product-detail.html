<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product | Amazona</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-top">
      <a href="index.html" class="logo"><i class="fas fa-bolt"></i> Ama<span>zona</span></a>
      <div class="search-bar">
        <input type="text" id="global-search" placeholder="Search...">
        <button><i class="fas fa-search"></i></button>
      </div>
      <nav class="nav-actions" id="main-nav"></nav>
    </div>
  </header>

  <main class="container">
    <div id="product-detail">
      <div class="spinner"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-bottom" style="border:none; padding:1.5rem;">
      <p>&copy; 2026 Amazona Inc. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  <script>
    async function loadProduct() {
      const id = new URLSearchParams(window.location.search).get('id');
      const container = document.getElementById('product-detail');
      if (!id) { container.innerHTML = '<div class="empty-state">Product not found</div>'; return; }
      try {
        const p = await API.getProduct(id);
        const stockClass = p.stockQuantity > 10 ? 'stock-in' : p.stockQuantity > 0 ? 'stock-low' : 'stock-out';
        const stockText = p.stockQuantity > 10 ? 'In Stock' : p.stockQuantity > 0 ? `Only ${p.stockQuantity} left` : 'Out of Stock';
        container.innerHTML = `
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:3rem; background:white; padding:2rem; border-radius:var(--radius); box-shadow:var(--shadow);">
            <div class="product-image" style="height:400px; border-radius:var(--radius);">
              <i class="fas fa-box" style="font-size:6rem;"></i>
            </div>
            <div>
              <p class="text-muted" style="text-transform:uppercase; font-weight:700; font-size:0.8rem; margin-bottom:0.5rem;">${p.category}</p>
              <h1 style="font-size:2rem; margin-bottom:1rem;">${p.productName}</h1>
              <div class="card-price" style="font-size:2rem; margin-bottom:1rem;"><span class="currency">$</span>${parseFloat(p.price).toFixed(2)}</div>
              <p style="margin-bottom:1.5rem; color:var(--muted);">Experience premium quality with ${p.productName}. Top-rated in ${p.category} category with fast delivery.</p>
              <div style="margin-bottom:1.5rem;">
                <span class="stock-badge ${stockClass}">${stockText}</span>
                <span class="text-muted" style="margin-left:1rem;"><i class="fas fa-truck"></i> Free shipping</span>
              </div>
              <div class="flex gap-2" style="margin-bottom:1.5rem;">
                <input type="number" id="qty" value="1" min="1" max="${p.stockQuantity}" class="form-control" style="width:80px; text-align:center;">
                <button class="btn btn-primary btn-lg" onclick="addToCartDetail(${p.productId})" ${p.stockQuantity<=0?'disabled':''}>
                  <i class="fas fa-cart-plus"></i> Add to Cart
                </button>
              </div>
              <a href="cart.html" class="btn btn-secondary"><i class="fas fa-shopping-cart"></i> View Cart</a>
              <a href="products.html" class="btn btn-outline" style="color:var(--text); border-color:var(--border); margin-left:0.5rem;"><i class="fas fa-arrow-left"></i> Back</a>
            </div>
          </div>
        `;
      } catch (e) {
        container.innerHTML = '<div class="empty-state">Product not found or error loading.</div>';
      }
    }
    async function addToCartDetail(id) {
      try {
        const p = await API.getProduct(id);
        const qty = parseInt(document.getElementById('qty').value) || 1;
        Cart.add(p, qty);
      } catch (e) { UI.toast(e.message, 'error'); }
    }
    loadProduct();
  </script>
</body>
</html>
