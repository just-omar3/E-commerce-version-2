<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed | Amazona</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page" style="background: linear-gradient(135deg, var(--success) 0%, #065f4a 100%);">
  <div class="auth-card" style="text-align:center; max-width:520px;">
    <div style="font-size:4rem; color:var(--success); margin-bottom:1rem;"><i class="fas fa-check-circle"></i></div>
    <h2 style="margin-bottom:0.5rem;">Order Confirmed!</h2>
    <p class="text-muted" style="margin-bottom:2rem;">Thank you for your purchase. Your order has been received and is being processed. You will receive an email confirmation shortly.</p>
    <div style="display:flex; gap:1rem; justify-content:center;">
      <a href="customer-dashboard.html" class="btn btn-primary"><i class="fas fa-list"></i> My Orders</a>
      <a href="products.html" class="btn btn-secondary"><i class="fas fa-shopping-bag"></i> Continue Shopping</a>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
