<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart | Amazona</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-top">
      <a href="index.html" class="logo"><i class="fas fa-bolt"></i> Ama<span>zona</span></a>
      <div class="search-bar">
        <input type="text" id="global-search" placeholder="Search...">
        <button><i class="fas fa-search"></i></button>
      </div>
      <nav class="nav-actions" id="main-nav"></nav>
    </div>
  </header>

  <main class="container">
    <h2 class="section-title"><i class="fas fa-shopping-cart"></i> Shopping Cart</h2>
    <div style="display:grid; grid-template-columns:1fr 360px; gap:2rem;">
      <div id="cart-items">
        <div class="spinner"></div>
      </div>
      <div class="cart-summary">
        <h3>Order Summary</h3>
        <div class="summary-row"><span>Subtotal</span><span id="cart-subtotal">$0.00</span></div>
        <div class="summary-row"><span>Shipping</span><span class="text-success">FREE</span></div>
        <div class="summary-row"><span>Tax</span><span>Calculated at checkout</span></div>
        <div class="summary-row total"><span>Total</span><span id="cart-total">$0.00</span></div>
        <button class="btn btn-primary w-full mt-2" onclick="proceedToCheckout()" id="checkout-btn">
          <i class="fas fa-credit-card"></i> Proceed to Checkout
        </button>
        <a href="products.html" class="btn btn-outline w-full mt-2" style="color:var(--text); border-color:var(--border);">
          <i class="fas fa-arrow-left"></i> Continue Shopping
        </a>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-bottom" style="border:none; padding:1.5rem;">
      <p>&copy; 2026 Amazona Inc. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  <script>
    function proceedToCheckout() {
      if (Cart.getItems().length === 0) {
        UI.toast('Your cart is empty', 'error');
        return;
      }
      if (!Auth.isLoggedIn()) {
        window.location.href = '/login.html?redirect=' + encodeURIComponent('/checkout.html');
        return;
      }
      window.location.href = 'checkout.html';
    }
    document.addEventListener('DOMContentLoaded', () => {
      Cart.render();
    });
  </script>
</body>
</html>
